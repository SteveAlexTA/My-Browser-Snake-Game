<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Snake Classic Game</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- ── HOME SCREEN ── -->
  <div id="home-screen">
    <div class="menu-card">
      <h1 class="menu-title" id="menu-title">SNAKE</h1>
      <p id="menu-subtitle">CLASSIC GAME</p>

      <div id="high-score-box">
        <span>🏆</span>
        <span>High Score: <strong id="high-score-value">0</strong></span>
      </div>

      <button id="btn-play" class="btn-primary" onclick="startGame()">
        <span>▶</span> PLAY GAME
      </button>
      <button id="btn-leaderboard" disabled>
        <span>🏆</span> LEADERBOARD
      </button>
      <button id="btn-settings" onclick="openSettings()">
        <span>⚙</span> SETTINGS
      </button>

      <div id="nav-dots">
        <span class="dot active"></span>
        <span class="dot"></span>
        <span class="dot"></span>
      </div>
    </div>
  </div>

  <!-- ── SETTINGS SCREEN ── -->
  <div id="settings-screen" class="hidden">
    <div class="menu-card">
      <h2 class="menu-title" style="font-size: 2.2rem; text-align: center;">SETTINGS</h2>
      
      <div class="instructions-box">
        <h3>CONTROLS</h3>
        <p><span>W / ⬆</span> Move Up</p>
        <p><span>S / ⬇</span> Move Down</p>
        <p><span>A / ⬅</span> Move Left</p>
        <p><span>D / ➡</span> Move Right</p>
        <p><span>SPACE</span> Restart</p>
        <p><span>Click ⏸</span> Pause/Resume</p>
      </div>

      <button class="btn-primary" onclick="closeSettings()">
        <span>←</span> BACK
      </button>
    </div>
  </div>

  <!-- ── GAME SCREEN ── -->
  <div id="game-screen" class="hidden">
    <header id="game-header">
      <button id="back-btn" onclick="goHome()">← Menu</button>
      <span id="game-title-small">🐍 SNAKE</span>
      <div id="header-right">
        <button id="pause-btn" onclick="togglePause()" title="Pause">⏸</button>
        <div id="score-box">
          <span id="score-label">SCORE</span>
          <span id="score">0</span>
        </div>
      </div>
    </header>
    <div id="canvas-container"></div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.0.0/p5.js"></script>
  <script src="config.js"></script>
  <script src="snake.js"></script>
  <script src="food.js"></script>
  <script src="game.js"></script>
</body>
</html>
