<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Snake Classic Game</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- ── HOME SCREEN ── -->
  <div id="home-screen">
    <div class="menu-card">
      <h1 class="menu-title" id="menu-title">SNAKE</h1>
      <p id="menu-subtitle">CLASSIC GAME</p>

      <div id="high-score-box">
        <span>🏆</span>
        <span>High Score: <strong id="high-score-value">0</strong></span>
      </div>

      <button id="btn-play" class="btn-primary" onclick="startGame()">
        <span>▶</span> PLAY GAME
      </button>
      <button id="btn-leaderboard" onclick="openLeaderboard()">
        <span>🏆</span> LEADERBOARD
      </button>
      <button id="btn-settings" onclick="openSettings()">
        <span>⚙</span> SETTINGS
      </button>


    </div>
  </div>

  <!-- ── SETTINGS SCREEN ── -->
  <div id="settings-screen" class="hidden">
    <div class="menu-card">
      <h2 class="menu-title" style="font-size: 2.2rem; text-align: center;">SETTINGS</h2>
      
      <div class="settings-form">
        <div class="setting-row">
          <label for="difficulty">Difficulty:</label>
          <select id="difficulty">
            <option value="15">Easy</option>
            <option value="10" selected>Medium</option>
            <option value="5">Hard</option>
          </select>
        </div>
        <div class="setting-row">
          <label for="sound">Sound:</label>
          <input type="checkbox" id="sound" checked>
        </div>
      </div>
      
      <div class="instructions-box">
        <h3>CONTROLS</h3>
        <p><span>W / ⬆</span> Move Up</p>
        <p><span>S / ⬇</span> Move Down</p>
        <p><span>A / ⬅</span> Move Left</p>
        <p><span>D / ➡</span> Move Right</p>
        <p><span>SPACE</span> Restart</p>
        <p><span>Click ⏸</span> Pause/Resume</p>
      </div>

      <div style="display: flex; gap: 10px; width: 100%;">
        <button class="btn-secondary" onclick="closeSettings(false)">CANCEL</button>
        <button class="btn-primary" onclick="closeSettings(true)">SAVE</button>
      </div>
    </div>
  </div>

  <!-- ── LEADERBOARD SCREEN ── -->
  <div id="leaderboard-screen" class="hidden">
    <div class="menu-card" style="width: min(420px, 95vw);">
      <h2 class="menu-title" style="font-size: 2.2rem; text-align: center; color: #d4860a; text-shadow: 0 0 10px rgba(212, 134, 10, 0.9);">LEADERBOARD</h2>
      
      <div class="leaderboard-container">
        <table id="leaderboard-table">
          <thead>
            <tr>
              <th>Rank</th>
              <th>Score</th>
              <th>Date</th>
            </tr>
          </thead>
          <tbody id="leaderboard-body">
            <!-- Scores populated via JS -->
          </tbody>
        </table>
        <div id="empty-leaderboard" class="hidden">
          No scores yet. Play a game!
        </div>
      </div>

      <button class="btn-primary" onclick="closeLeaderboard()" style="margin-top: 10px;">
        <span>←</span> BACK
      </button>
    </div>
  </div>

  <!-- ── GAME SCREEN ── -->
  <div id="game-screen" class="hidden">
    <header id="game-header">
      <div id="header-left">
        <div class="header-box">Score: <span id="score">0</span></div>
      </div>
      <div id="header-center">
        <div class="header-box" style="font-weight: 700; color: #00e676; border-color: #00e676;">Snake Game</div>
      </div>
      <div id="header-right">
        <div class="header-box">High Score: <span id="header-high-score">0</span></div>
        <button id="pause-btn" onclick="togglePause()" title="Pause">⏸</button>
      </div>
    </header>
    <div id="canvas-container">
      <div id="pause-overlay" class="hidden">
        <h2 style="color: #00e676; font-size: 2.5rem; letter-spacing: 5px; margin-bottom: 20px; text-shadow: 0 0 15px rgba(0,230,118,0.8);">PAUSED</h2>
        <div style="display: flex; flex-direction: column; gap: 15px; width: 200px;">
          <button class="btn-primary" onclick="togglePause()" style="font-size: 1rem; padding: 12px;">▶ Resume</button>
          <button class="btn-secondary" onclick="restartGame()" style="font-size: 1rem; padding: 12px; background: #d4860a;">↻ Restart</button>
          <button class="btn-secondary" onclick="goHome()" style="font-size: 1rem; padding: 12px; background: #8b0000; color: white;">✖ Quit</button>
        </div>
      </div>
      <div id="game-over-overlay" class="hidden">
        <h2 style="color: #ff4646; font-size: 2.5rem; letter-spacing: 5px; margin-bottom: 10px; text-shadow: 0 0 15px rgba(255,70,70,0.8);">GAME OVER</h2>
        <div style="color: #00e676; font-size: 1.2rem; font-weight: bold; margin-bottom: 20px;">SCORE: <span id="game-over-score">0</span></div>
        <div style="display: flex; flex-direction: column; gap: 15px; width: 220px;">
          <button class="btn-primary" onclick="restartGame()" style="font-size: 1rem; padding: 12px; background: #d4860a;">↻ Restart (Enter)</button>
          <button class="btn-secondary" onclick="goHome()" style="font-size: 1rem; padding: 12px; background: #8b0000; color: white;">✖ Menu (Esc)</button>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.0.0/p5.js"></script>
  <script src="config.js"></script>
  <script src="snake.js"></script>
  <script src="food.js"></script>
  <script src="game.js"></script>
</body>
</html>
